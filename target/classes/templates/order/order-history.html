<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><title>Lịch sử đơn hàng</title></head>
<body>
<div layout:fragment="content">
<div class="container py-4">
    <h3 class="section-title"><i class="bi bi-receipt"></i> Lịch sử đơn hàng</h3>
    <div th:if="${orders != null && !orders.isEmpty()}">
        <div th:each="order : ${orders}" class="order-card">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div>
                    <h6 class="fw-bold mb-1">Đơn hàng #<span th:text="${order.id}"></span></h6>
                    <small class="text-muted"><i class="bi bi-calendar"></i> <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span></small>
                    <span class="ms-2 badge" th:class="'badge ' + ${order.statusBadgeClass}" th:text="${order.statusDisplay}"></span>
                </div>
                <div class="text-end">
                    <div class="fw-bold text-price" th:text="${#numbers.formatDecimal(order.totalAmount - order.discountAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></div>
                    <small class="text-muted" th:text="'Thanh toán: ' + ${order.paymentMethod}"></small>
                </div>
            </div>
            <div class="mt-2 d-flex gap-2">
                <a th:href="@{/order/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i> Chi tiết</a>
                <form th:if="${order.status == 'PENDING'}" th:action="@{/order/{id}/cancel(id=${order.id})}" method="post" class="d-inline" onsubmit="return confirm('Bạn có chắc muốn hủy đơn hàng này?')">
                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-x-circle"></i> Hủy đơn</button>
                </form>
            </div>
        </div>
    </div>
    <div th:if="${orders == null || orders.isEmpty()}" class="text-center py-5">
        <i class="bi bi-receipt-cutoff" style="font-size:4rem;color:#ccc"></i>
        <h4 class="mt-3">Bạn chưa có đơn hàng nào</h4>
        <a href="/products" class="btn btn-primary-custom mt-2">Mua sắm ngay</a>
    </div>
</div>
</div>
</body>
</html>
