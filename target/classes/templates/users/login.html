<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Văn Phòng Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-shop d-block"></i>
            <h2>Đăng nhập</h2>
            <p class="text-muted">Chào mừng trở lại Văn Phòng Phẩm</p>
        </div>
        <div th:if="${param.error}" class="alert alert-danger py-2"><i class="bi bi-x-circle"></i> Sai tên đăng nhập hoặc mật khẩu!</div>
        <div th:if="${param.logout}" class="alert alert-info py-2"><i class="bi bi-check-circle"></i> Đã đăng xuất thành công!</div>
        <div th:if="${param.registered}" class="alert alert-success py-2"><i class="bi bi-check-circle"></i> Đăng ký thành công! Vui lòng đăng nhập.</div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3"><label class="form-label fw-bold">Tên đăng nhập</label><input type="text" class="form-control" name="username" required autofocus placeholder="Nhập username"></div>
            <div class="mb-3"><label class="form-label fw-bold">Mật khẩu</label><input type="password" class="form-control" name="password" required placeholder="Nhập mật khẩu"></div>
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check"><input class="form-check-input" type="checkbox" name="remember-me" id="remember"><label class="form-check-label" for="remember">Ghi nhớ đăng nhập</label></div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 btn-lg">Đăng nhập</button>
        </form>
        <p class="text-center mt-3 mb-0">Chưa có tài khoản? <a href="/register" class="text-decoration-none fw-bold" style="color:var(--primary)">Đăng ký ngay</a></p>
        <div class="text-center mt-3"><a href="/" class="text-muted small"><i class="bi bi-arrow-left"></i> Về trang chủ</a></div>
    </div>
</div>
</body>
</html>
