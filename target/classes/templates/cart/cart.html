<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><title>Giỏ hàng</title></head>
<body>
<div layout:fragment="content">
<div class="container py-4">
    <h3 class="section-title"><i class="bi bi-cart3"></i> Giỏ hàng</h3>
    <div th:if="${cartItems != null && !cartItems.isEmpty()}">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="table-responsive admin-table">
                    <table class="table table-hover mb-0 cart-table">
                        <thead><tr><th>Sản phẩm</th><th>Đơn giá</th><th>Số lượng</th><th>Thành tiền</th><th></th></tr></thead>
                        <tbody>
                            <tr th:each="item : ${cartItems}">
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://via.placeholder.com/60'}" style="width:60px;height:60px;object-fit:cover;border-radius:8px">
                                        <div>
                                            <a th:href="@{/products/{id}(id=${item.product.id})}" class="fw-bold text-dark" th:text="${item.product.name}"></a>
                                            <small class="d-block text-muted" th:text="${item.product.category?.name}"></small>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span th:if="${item.product.onSale}" class="text-original d-block" th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                                    <span class="text-price" th:text="${#numbers.formatDecimal(item.product.effectivePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                                </td>
                                <td>
                                    <div class="cart-quantity cart-qty-form">
                                        <button type="button" onclick="decrementQty(this)">-</button>
                                        <input type="number" th:value="${item.quantity}" min="1" th:max="${item.product.stockQuantity}" th:data-product-id="${item.product.id}">
                                        <button type="button" onclick="incrementQty(this)">+</button>
                                    </div>
                                </td>
                                <td class="fw-bold" th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                                <td><a th:href="@{/cart/remove/{id}(id=${item.product.id})}" class="text-danger"><i class="bi bi-trash"></i></a></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Coupon -->
                <div class="card mt-3">
                    <div class="card-body">
                        <h6 class="fw-bold"><i class="bi bi-ticket-perforated"></i> Mã giảm giá</h6>
                        <div th:if="${appliedCoupon}" class="alert alert-success d-flex justify-content-between align-items-center py-2">
                            <span>Mã <strong th:text="${appliedCoupon}"></strong> - Giảm <strong th:text="${#numbers.formatDecimal(discountAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></strong></span>
                            <a href="/cart/remove-coupon" class="text-danger"><i class="bi bi-x-circle"></i> Gỡ</a>
                        </div>
                        <form th:unless="${appliedCoupon}" th:action="@{/cart/apply-coupon}" method="post" class="coupon-input">
                            <div class="input-group">
                                <input type="text" class="form-control" name="couponCode" placeholder="Nhập mã giảm giá" required>
                                <button type="submit" class="btn btn-primary-custom">Áp dụng</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="cart-summary">
                    <h5 class="fw-bold mb-3">Tóm tắt đơn hàng</h5>
                    <div class="d-flex justify-content-between mb-2"><span>Tạm tính:</span><span th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span></div>
                    <div th:if="${discountAmount > 0}" class="d-flex justify-content-between mb-2 text-success"><span>Giảm giá:</span><span th:text="'-' + ${#numbers.formatDecimal(discountAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span></div>
                    <hr>
                    <div class="d-flex justify-content-between fw-bold fs-5"><span>Tổng cộng:</span><span class="text-price" th:text="${#numbers.formatDecimal(finalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span></div>
                    <a href="/order/checkout" class="btn btn-primary-custom w-100 mt-3 btn-lg"><i class="bi bi-credit-card"></i> Đặt hàng</a>
                    <a href="/products" class="btn btn-outline-secondary w-100 mt-2">Tiếp tục mua sắm</a>
                    <a href="/cart/clear" class="btn btn-link text-danger w-100 mt-1 btn-sm">Xóa tất cả</a>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${cartItems == null || cartItems.isEmpty()}" class="text-center py-5">
        <i class="bi bi-cart-x" style="font-size:4rem;color:#ccc"></i>
        <h4 class="mt-3">Giỏ hàng trống</h4>
        <p class="text-muted">Bạn chưa thêm sản phẩm nào vào giỏ hàng</p>
        <a href="/products" class="btn btn-primary-custom"><i class="bi bi-bag"></i> Mua sắm ngay</a>
    </div>
</div>
</div>
</body>
</html>
