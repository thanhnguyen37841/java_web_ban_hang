<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><title>Thanh toán</title></head>
<body>
<div layout:fragment="content">
<div class="container py-4">
    <h3 class="section-title"><i class="bi bi-credit-card"></i> Thanh toán</h3>
    <form th:action="@{/order/submit}" method="post">
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-white"><h5 class="mb-0">Thông tin giao hàng</h5></div>
                    <div class="card-body">
                        <div class="mb-3"><label class="form-label fw-bold">Họ tên *</label><input type="text" class="form-control" name="customerName" th:value="${userFullName}" required></div>
                        <div class="row">
                            <div class="col-md-6 mb-3"><label class="form-label fw-bold">Số điện thoại *</label><input type="tel" class="form-control" name="phone" th:value="${userPhone}" required pattern="[0-9]{10,11}"></div>
                            <div class="col-md-6 mb-3"><label class="form-label fw-bold">Email *</label><input type="email" class="form-control" name="email" th:value="${userEmail}" required></div>
                        </div>
                        <div class="mb-3"><label class="form-label fw-bold">Địa chỉ giao hàng *</label><textarea class="form-control" name="address" rows="2" th:text="${userAddress}" required></textarea></div>
                        <div class="mb-3"><label class="form-label fw-bold">Ghi chú</label><textarea class="form-control" name="note" rows="2" placeholder="Ghi chú thêm cho đơn hàng..."></textarea></div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Phương thức thanh toán *</label>
                            <div class="payment-method">
                                <div class="form-check"><input class="form-check-input" type="radio" name="paymentMethod" value="COD" id="cod" checked><label class="form-check-label" for="cod"><i class="bi bi-cash"></i> Thanh toán khi nhận hàng (COD)</label></div>
                                <div class="form-check"><input class="form-check-input" type="radio" name="paymentMethod" value="BANK" id="bank"><label class="form-check-label" for="bank"><i class="bi bi-bank"></i> Chuyển khoản ngân hàng</label></div>
                                <div class="form-check"><input class="form-check-input" type="radio" name="paymentMethod" value="MOMO" id="momo"><label class="form-check-label" for="momo"><i class="bi bi-phone"></i> Ví MoMo</label></div>
                                <div class="form-check"><input class="form-check-input" type="radio" name="paymentMethod" value="VNPAY" id="vnpay"><label class="form-check-label" for="vnpay"><i class="bi bi-credit-card-2-front"></i> VNPay</label></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="cart-summary">
                    <h5 class="fw-bold mb-3">Đơn hàng của bạn</h5>
                    <div th:each="item : ${cartItems}" class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                        <div class="d-flex align-items-center gap-2">
                            <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://via.placeholder.com/40'}" style="width:40px;height:40px;object-fit:cover;border-radius:6px">
                            <div><span class="small fw-bold" th:text="${item.product.name}"></span><br><small class="text-muted" th:text="'x' + ${item.quantity}"></small></div>
                        </div>
                        <span class="fw-bold small" th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                    </div>
                    <div class="d-flex justify-content-between mb-2"><span>Tạm tính:</span><span th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span></div>
                    <div th:if="${discountAmount > 0}" class="d-flex justify-content-between mb-2 text-success"><span>Giảm giá <small th:text="'(' + ${appliedCoupon} + ')'"></small>:</span><span th:text="'-' + ${#numbers.formatDecimal(discountAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span></div>
                    <div class="d-flex justify-content-between mb-2"><span>Phí vận chuyển:</span><span class="text-success">Miễn phí</span></div>
                    <hr>
                    <div class="d-flex justify-content-between fw-bold fs-5"><span>Tổng cộng:</span><span class="text-price" th:text="${#numbers.formatDecimal(finalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span></div>
                    <button type="submit" class="btn btn-primary-custom w-100 mt-3 btn-lg"><i class="bi bi-check-circle"></i> Đặt hàng</button>
                    <a href="/cart" class="btn btn-link w-100 mt-1">← Quay lại giỏ hàng</a>
                </div>
            </div>
        </div>
    </form>
</div>
</div>
</body>
</html>
