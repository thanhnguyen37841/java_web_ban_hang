<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Thêm danh mục</title></head>
<body>
<div layout:fragment="content">
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-2 px-0"><div th:replace="~{admin/_sidebar :: sidebar}"></div></div>
        <div class="col-md-10 px-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/admin/dashboard">Quản trị</a></li>
                    <li class="breadcrumb-item"><a href="/admin/categories">Danh mục</a></li>
                    <li class="breadcrumb-item active">Thêm mới</li>
                </ol>
            </nav>
            <div class="card shadow-sm" style="max-width: 600px;">
                <div class="card-header bg-white"><h5 class="mb-0"><i class="bi bi-plus-circle"></i> Thêm danh mục mới</h5></div>
                <div class="card-body">
                    <form th:action="@{/admin/categories/add}" method="post" th:object="${category}">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên danh mục *</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>
                        <hr>
                        <button type="submit" class="btn btn-primary-custom"><i class="bi bi-check-lg"></i> Thêm danh mục</button>
                        <a href="/admin/categories" class="btn btn-secondary ms-2">Hủy</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
</body>
</html>
