<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Văn Phòng Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card" style="max-width:500px">
        <div class="auth-header">
            <i class="bi bi-person-plus d-block"></i>
            <h2>Đăng ký</h2>
            <p class="text-muted">Tạo tài khoản mới tại Văn Phòng Phẩm</p>
        </div>
        <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
        <form th:action="@{/register}" method="post" th:object="${user}" id="registrationForm">
            <div class="mb-3"><label class="form-label fw-bold">Tên đăng nhập *</label><input type="text" class="form-control" th:field="*{username}" required minlength="3" placeholder="Nhập username"></div>
            <div class="mb-3"><label class="form-label fw-bold">Họ tên</label><input type="text" class="form-control" th:field="*{fullName}" placeholder="Nguyễn Văn A"></div>
            <div class="row">
                <div class="col-md-6 mb-3"><label class="form-label fw-bold">Email *</label><input type="email" class="form-control" th:field="*{email}" required placeholder="email@example.com">
                    <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div></div>
                <div class="col-md-6 mb-3"><label class="form-label fw-bold">Số điện thoại *</label><input type="tel" class="form-control" th:field="*{phone}" required placeholder="0123456789">
                    <div class="text-danger small" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div></div>
            </div>
            <div class="mb-3"><label class="form-label fw-bold">Địa chỉ</label><input type="text" class="form-control" th:field="*{address}" placeholder="123 Nguyễn Huệ, Q1, TP.HCM"></div>
            <div class="mb-3"><label class="form-label fw-bold">Mật khẩu *</label><input type="password" class="form-control" th:field="*{password}" required minlength="6" placeholder="Ít nhất 6 ký tự"></div>
            <button type="submit" class="btn btn-primary-custom w-100 btn-lg">Đăng ký</button>
        </form>
        <p class="text-center mt-3 mb-0">Đã có tài khoản? <a href="/login" class="text-decoration-none fw-bold" style="color:var(--primary)">Đăng nhập</a></p>
        <div class="text-center mt-3"><a href="/" class="text-muted small"><i class="bi bi-arrow-left"></i> Về trang chủ</a></div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
