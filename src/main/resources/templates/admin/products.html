<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><title>Quản lý sản phẩm - Admin</title></head>
<body>
<div layout:fragment="content">
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-2 px-0"><div th:replace="~{admin/_sidebar :: sidebar}"></div></div>
        <div class="col-md-10 px-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold mb-0"><i class="bi bi-box-seam"></i> Quản lý sản phẩm</h3>
                <a href="/products/add" class="btn btn-primary-custom"><i class="bi bi-plus-circle"></i> Thêm sản phẩm</a>
            </div>
            <div class="admin-table">
                <table class="table table-hover mb-0">
                    <thead><tr><th style="width:60px">Ảnh</th><th>Tên</th><th>Danh mục</th><th>Giá gốc</th><th>Giá sale</th><th>Tồn kho</th><th>Nổi bật</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
                    <tbody>
                        <tr th:each="p : ${products}" th:classappend="${p.stockQuantity < 5} ? 'low-stock-warning'">
                            <td><img th:src="${p.imageUrl != null ? p.imageUrl : 'https://via.placeholder.com/50'}" style="width:50px;height:50px;object-fit:cover;border-radius:6px"></td>
                            <td><a th:href="@{/products/{id}(id=${p.id})}" class="fw-bold text-dark" th:text="${p.name}"></a></td>
                            <td th:text="${p.category?.name}"></td>
                            <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                            <td><span th:if="${p.salePrice > 0}" class="text-danger fw-bold" th:text="${#numbers.formatDecimal(p.salePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span><span th:unless="${p.salePrice > 0}" class="text-muted">—</span></td>
                            <td><span th:class="${p.stockQuantity < 5} ? 'badge bg-danger' : (${p.stockQuantity < 10} ? 'badge bg-warning text-dark' : 'badge bg-success')" th:text="${p.stockQuantity}"></span></td>
                            <td><i th:if="${p.featured}" class="bi bi-star-fill text-warning"></i></td>
                            <td><span th:if="${p.active}" class="badge bg-success">Hiển thị</span><span th:unless="${p.active}" class="badge bg-secondary">Ẩn</span></td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-outline-primary" title="Sửa"><i class="bi bi-pencil"></i></a>
                                    <form th:action="@{/products/delete/{id}(id=${p.id})}" method="post" class="d-inline" onsubmit="return confirm('Xóa sản phẩm này?')">
                                        <button type="submit" class="btn btn-outline-danger" title="Xóa"><i class="bi bi-trash"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${products == null || products.isEmpty()}" class="text-center text-muted py-4">Chưa có sản phẩm nào.</p>
        </div>
    </div>
</div>
</div>
</body>
</html>
