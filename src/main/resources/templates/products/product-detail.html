<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" layout:decorate="~{layout}">
<head><title th:text="${product.name}">Chi tiết sản phẩm</title></head>
<body>
<div layout:fragment="content">
<div class="container py-4">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
        <li class="breadcrumb-item"><a href="/products">Sản phẩm</a></li>
        <li class="breadcrumb-item" th:if="${product.category}"><a th:href="@{/products(categoryId=${product.category.id})}" th:text="${product.category.name}"></a></li>
        <li class="breadcrumb-item active" th:text="${product.name}"></li>
    </ol></nav>

    <div class="row g-4">
        <!-- Image Gallery -->
        <div class="col-md-6">
            <div class="product-gallery-main">
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/600'}" alt="" id="mainImage">
            </div>
            <div class="product-gallery-thumbs" th:if="${not #lists.isEmpty(product.images)}">
                <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" class="active" onclick="changeMainImage(this.src)">
                <img th:each="img : ${product.images}" th:src="${img.imageUrl}" onclick="changeMainImage(this.src)">
            </div>
        </div>

        <!-- Product Info -->
        <div class="col-md-6 product-info">
            <h2 class="product-title" th:text="${product.name}"></h2>
            <div class="d-flex align-items-center gap-3 my-2">
                <span class="badge bg-secondary" th:if="${product.brand}" th:text="${product.brand}"></span>
                <span class="star-rating">
                    <span th:each="i : ${#numbers.sequence(1,5)}">
                        <i th:class="${i <= averageRating ? 'bi bi-star-fill' : 'bi bi-star'}"></i>
                    </span>
                    <small class="text-muted ms-1" th:text="'(' + ${#lists.size(reviews)} + ' đánh giá)'"></small>
                </span>
            </div>

            <!-- Price -->
            <div class="my-3">
                <div th:if="${product.onSale}">
                    <span class="text-original fs-5" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                    <span class="price-big ms-2" th:text="${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                    <span class="discount-badge ms-2" th:text="'-' + ${product.discountPercent} + '%'"></span>
                </div>
                <div th:unless="${product.onSale}">
                    <span class="price-big" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                </div>
            </div>

            <!-- Stock -->
            <div class="mb-3">
                <span th:if="${product.inStock}" class="badge bg-success"><i class="bi bi-check-circle"></i> Còn hàng (<span th:text="${product.stockQuantity}"></span>)</span>
                <span th:unless="${product.inStock}" class="badge bg-danger"><i class="bi bi-x-circle"></i> Hết hàng</span>
            </div>

            <!-- Description -->
            <p class="text-muted" th:text="${product.description}"></p>

            <!-- Add to Cart -->
            <form th:action="@{/cart/add}" method="post" sec:authorize="hasAuthority('USER')" th:if="${product.inStock}">
                <input type="hidden" name="productId" th:value="${product.id}">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <label class="fw-bold">Số lượng:</label>
                    <div class="quantity-selector">
                        <button type="button" onclick="decrementQty(this)">-</button>
                        <input type="number" name="quantity" value="1" min="1" th:max="${product.stockQuantity}">
                        <button type="button" onclick="incrementQty(this)">+</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom btn-lg"><i class="bi bi-cart-plus"></i> Thêm vào giỏ hàng</button>
            </form>
            <div th:unless="${product.inStock}" class="alert alert-warning">Sản phẩm hiện đã hết hàng</div>
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn btn-outline-custom">Đăng nhập để mua hàng</a>
        </div>
    </div>

    <!-- Reviews -->
    <div class="mt-5">
        <h4 class="section-title">Đánh giá sản phẩm <small class="text-muted" th:text="'(' + ${#lists.size(reviews)} + ')'"></small></h4>

        <!-- Review Form -->
        <div class="card mb-4" sec:authorize="hasAuthority('USER')">
            <div class="card-body">
                <h6 class="fw-bold">Viết đánh giá của bạn</h6>
                <form th:action="@{/products/{id}/review(id=${product.id})}" method="post">
                    <div class="mb-2">
                        <label class="form-label">Đánh giá:</label>
                        <div class="star-rating-input">
                            <input type="radio" name="rating" value="5" id="star5"><label for="star5"><i class="bi bi-star-fill"></i></label>
                            <input type="radio" name="rating" value="4" id="star4"><label for="star4"><i class="bi bi-star-fill"></i></label>
                            <input type="radio" name="rating" value="3" id="star3" checked><label for="star3"><i class="bi bi-star-fill"></i></label>
                            <input type="radio" name="rating" value="2" id="star2"><label for="star2"><i class="bi bi-star-fill"></i></label>
                            <input type="radio" name="rating" value="1" id="star1"><label for="star1"><i class="bi bi-star-fill"></i></label>
                        </div>
                    </div>
                    <div class="mb-2">
                        <textarea class="form-control" name="comment" rows="3" placeholder="Nhận xét của bạn..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary-custom btn-sm"><i class="bi bi-send"></i> Gửi đánh giá</button>
                </form>
            </div>
        </div>

        <!-- Reviews List -->
        <div th:each="review : ${reviews}" class="review-card">
            <div class="d-flex justify-content-between">
                <span class="reviewer" th:text="${review.user?.username}">User</span>
                <small class="text-muted" th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy')}"></small>
            </div>
            <div class="star-rating my-1">
                <span th:each="i : ${#numbers.sequence(1,5)}"><i th:class="${i <= review.rating ? 'bi bi-star-fill' : 'bi bi-star'}"></i></span>
            </div>
            <p class="mb-0 text-muted" th:text="${review.comment}"></p>
        </div>
        <p th:if="${reviews == null || reviews.isEmpty()}" class="text-muted">Chưa có đánh giá nào cho sản phẩm này.</p>
    </div>

    <!-- Related Products -->
    <div class="mt-5" th:if="${relatedProducts != null && !relatedProducts.isEmpty()}">
        <h4 class="section-title">Sản phẩm liên quan</h4>
        <div class="row g-3">
            <div class="col-6 col-md-3" th:each="rp : ${relatedProducts}">
                <div class="product-card card">
                    <div class="product-image-wrapper">
                        <img th:src="${rp.imageUrl != null ? rp.imageUrl : 'https://via.placeholder.com/400'}" alt="">
                    </div>
                    <div class="card-body">
                        <a th:href="@{/products/{id}(id=${rp.id})}" class="d-block product-name" th:text="${rp.name}"></a>
                        <span class="text-price" th:text="${#numbers.formatDecimal(rp.effectivePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
</body>
</html>
